<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — EvidAI</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }

    .auth-wrap {
      width:100%;
      max-width:440px;
    }

    .auth-brand {
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      margin-bottom:36px;
      font-family:var(--ff-display);
      font-size:20px;
      font-weight:700;
      color:var(--chalk);
    }

    .auth-brand span { color:var(--gold); }

    .auth-card {
      background:var(--ink-2);
      border:1px solid var(--wire-mid);
      border-top:2px solid var(--gold);
      border-radius:var(--r-lg);
      padding:36px 32px;
    }

    .auth-title {
      font-family:var(--ff-display);
      font-size:26px;
      font-weight:700;
      color:var(--chalk);
      margin-bottom:6px;
    }

    .auth-sub {
      font-size:13px;
      color:var(--chalk-3);
      margin-bottom:28px;
    }

    .auth-sub a { color:var(--gold); text-decoration:none; }
    .auth-sub a:hover { text-decoration:underline; }

    .field { margin-bottom:16px; }

    .field-label {
      display:block;
      font-family:var(--ff-mono);
      font-size:10px;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--chalk-3);
      margin-bottom:7px;
    }

    .field-input {
      width:100%;
      background:var(--ink-3);
      border:1px solid var(--wire);
      border-radius:var(--r-md);
      color:var(--chalk);
      font-family:var(--ff-body);
      font-size:14px;
      padding:12px 14px;
      outline:none;
      transition:border-color 0.2s;
    }

    .field-input:focus { border-color:rgba(200,168,75,0.5); }
    .field-input::placeholder { color:var(--chalk-3); }

    .forgot {
      display:block;
      text-align:right;
      font-size:12px;
      color:var(--chalk-3);
      margin-top:6px;
      text-decoration:none;
      transition:color 0.2s;
    }
    .forgot:hover { color:var(--gold); }

    .btn-submit {
      width:100%;
      margin-top:24px;
      padding:13px;
      font-size:14px;
      font-weight:600;
      letter-spacing:0.04em;
      font-family:var(--ff-body);
      background:var(--gold);
      color:var(--ink);
      border:none;
      border-radius:var(--r-md);
      cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-submit:hover { opacity:0.88; }
    .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }

    .divider {
      display:flex;
      align-items:center;
      gap:12px;
      margin:24px 0;
      color:var(--chalk-3);
      font-size:12px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:var(--wire);
    }

    .btn-google {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px;
      background:var(--ink-3);
      border:1px solid var(--wire-mid);
      border-radius:var(--r-md);
      color:var(--chalk);
      font-family:var(--ff-body);
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      transition:all 0.2s;
    }
    .btn-google:hover { background:var(--ink-4); border-color:var(--wire-hi); }

    .auth-error {
      background:rgba(192,57,43,0.1);
      border:1px solid rgba(192,57,43,0.3);
      border-radius:var(--r-md);
      color:#e74c3c;
      font-size:13px;
      padding:10px 14px;
      margin-top:16px;
      display:none;
    }

    .auth-footer {
      text-align:center;
      margin-top:24px;
      font-size:13px;
      color:var(--chalk-3);
    }

    .auth-footer a { color:var(--gold); text-decoration:none; }
    .auth-footer a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="auth-wrap">

  <div class="auth-brand">
    <img src="../assets/logo.svg" width="32" height="32" alt="EvidAI"/>
    EvidAI <span>Solutions</span>
  </div>

  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <p class="auth-sub">Sign in to access your case history and profile.<br>
      New here? <a href="signup.html">Create an account</a>
    </p>

    <!-- Google sign-in -->
    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with email</div>

    <!-- Email/password form -->
    <div class="field">
      <label class="field-label">Email address</label>
      <input class="field-input" type="email" id="email" placeholder="you@organization.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <a href="forgot-password.html" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-submit" id="btn-signin">Sign in</button>

    <div class="auth-error" id="auth-error"></div>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Sign up free</a>
  </div>

</div>

<script type="module">
  import {
    auth, gProvider,
    signInWithEmailAndPassword,
    signInWithPopup,
    redirectIfLoggedIn,
  } from '../assets/js/firebase-config.js';

  // Redirect if already logged in
  redirectIfLoggedIn('../index.html');

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':     'Invalid email or password.',
      'auth/user-not-found':         'No account found with this email.',
      'auth/wrong-password':         'Incorrect password.',
      'auth/too-many-requests':      'Too many attempts. Try again later.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };
    return map[code] || 'Sign-in failed. Please try again.';
  }

  // Email/password sign-in
  document.getElementById('btn-signin').addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-signin');

    if (!email || !password) { showError('Please fill in all fields.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = '../index.html';
    } catch (err) {
      showError(friendlyError(err.code));
      btn.disabled    = false;
      btn.textContent = 'Sign in';
    }
  });

  // Google sign-in
  document.getElementById('btn-google').addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, gProvider);
      window.location.href = '../index.html';
    } catch (err) {
      showError(friendlyError(err.code));
    }
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-signin').click();
  });
</script>
</body>
</html>
